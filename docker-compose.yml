services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_COUCHDB_URL: ${COUCHDB_URL}
        VITE_SIGNUP_URL: ${BACKEND_URL}
    ports:
      - "4000:80"

  backend:
    build: ./backend
    ports:
      - "4001:3000"
    environment:
      COUCHDB_URL: ${COUCHDB_URL}
      COUCHDB_USER: ${COUCHDB_USER}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD}
      BACKEND_ALLOWED_ORIGINS: ${BACKEND_ALLOWED_ORIGINS:-*}
    depends_on:
      - couchdb

  couchdb:
    image: couchdb:3.5.1
    ports:
      - "4002:5984"
    environment:
      COUCHDB_USER: ${COUCHDB_USER}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD}
      COUCHDB_BIND_ADDRESS: ${COUCHDB_BIND_ADDRESS}
      COUCHDB_AUTH_SECRET: ${COUCHDB_AUTH_SECRET}
      COUCHDB_AUTH_TIMEOUT: ${COUCHDB_AUTH_TIMEOUT}
      COUCHDB_ALLOWED_ORIGINS: ${COUCHDB_ALLOWED_ORIGINS}
      COUCHDB_DATABASE_PREFIX: ${COUCHDB_DATABASE_PREFIX}
    configs:
      - source: couchdb_ini
        target: /opt/couchdb/etc/local.d/local.ini
    volumes:
      - couchdb_data:/opt/couchdb/data
    restart: unless-stopped

volumes:
  couchdb_data:

configs:
  couchdb_ini:
    content: |
      [couchdb]
      single_node = true

      [chttpd]
      enable_cors = true
      bind_address = ${COUCHDB_BIND_ADDRESS}

      [chttpd_auth]
      secret = ${COUCHDB_AUTH_SECRET}
      timeout = ${COUCHDB_AUTH_TIMEOUT}

      [cors]
      origins = ${COUCHDB_ALLOWED_ORIGINS}
      credentials = true
      methods = GET, PUT, POST, HEAD, DELETE
      headers = accept, authorization, content-type, origin, referer, x-csrf-token

      [couch_peruser]
      enable = true
      database_prefix = ${COUCHDB_DATABASE_PREFIX}
      delete_dbs = false
