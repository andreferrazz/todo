services:
  couchdb:
    image: couchdb:3
    ports:
      - "5984:5984"
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-changeme}
    volumes:
      - couchdb_data:/opt/couchdb/data
      - ./couchdb/local.ini:/opt/couchdb/etc/local.d/local.ini

  signup-proxy:
    build: ./signup-proxy
    ports:
      - "3000:3000"
    environment:
      COUCHDB_URL: http://couchdb:5984
      COUCHDB_USER: admin
      COUCHDB_PASS: ${COUCHDB_PASSWORD:-changeme}
    depends_on:
      - couchdb

volumes:
  couchdb_data:
